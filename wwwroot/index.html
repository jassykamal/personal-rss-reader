<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal RSS Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --soft: #f8fafc;
      --text: #172033;
      --muted: #667085;
      --subtle: #98a2b3;
      --line: #d9e2ef;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --brand-soft: #d9f3ef;
      --accent: #e85d3f;
      --danger: #d92d20;
      --success: #078267;
      --shadow: 0 18px 48px rgba(31, 44, 71, 0.12);
      --shadow-soft: 0 10px 28px rgba(31, 44, 71, 0.08);
      --radius: 8px;
      --sidebar: 336px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.09), transparent 34rem),
        linear-gradient(315deg, rgba(232, 93, 63, 0.09), transparent 30rem),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input { font: inherit; }
    button { border: 0; }
    a { color: inherit; }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      height: 100vh;
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: rgba(255, 255, 255, 0.88);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
      box-shadow: 8px 0 32px rgba(31, 44, 71, 0.06);
      z-index: 3;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 22px 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: var(--brand);
      color: #fff;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.22);
      flex: 0 0 auto;
    }

    .brand-title {
      display: block;
      font-size: 1rem;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .sidebar-content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
    }

    .add-panel {
      padding: 16px;
      margin-bottom: 18px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .input-row {
      display: grid;
      gap: 10px;
    }

    .feed-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--text);
      border-radius: var(--radius);
      padding: 12px 13px;
      outline: 0;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .feed-input:focus {
      background: #fff;
      border-color: rgba(15, 118, 110, 0.7);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    .primary-button,
    .action-button,
    .lang-button,
    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease, box-shadow 160ms ease;
      white-space: nowrap;
    }

    .primary-button {
      width: 100%;
      padding: 0 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.18);
    }

    .primary-button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .action-button,
    .lang-button,
    .icon-button {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .action-button {
      min-height: 34px;
      padding: 0 10px;
    }

    .icon-button {
      display: none;
      width: 38px;
      font-size: 1.1rem;
    }

    .lang-button {
      padding: 0 12px;
    }

    .action-button:hover,
    .lang-button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 118, 110, 0.34);
      color: var(--brand-dark);
      box-shadow: var(--shadow-soft);
    }

    .action-button.danger:hover {
      color: var(--danger);
      border-color: rgba(217, 45, 32, 0.34);
    }

    .primary-button:disabled,
    .action-button:disabled {
      opacity: 0.58;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    .add-status {
      min-height: 20px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .add-status.error { color: var(--danger); }
    .add-status.success { color: var(--success); }
    .add-status.loading { color: var(--brand-dark); }

    .feed-list {
      display: grid;
      gap: 10px;
    }

    .feed-item {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 14px;
      overflow: hidden;
      animation: riseIn 240ms ease both;
    }

    .feed-item::before {
      content: "";
      position: absolute;
      inset-block: 0;
      inset-inline-start: 0;
      width: 4px;
      background: var(--feed-color);
    }

    .feed-top {
      display: flex;
      align-items: start;
      gap: 10px;
      min-width: 0;
    }

    .feed-dot {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border-radius: 999px;
      background: var(--feed-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--feed-color) 16%, transparent);
      flex: 0 0 auto;
    }

    .feed-copy {
      min-width: 0;
      flex: 1;
    }

    .feed-name {
      display: block;
      font-weight: 850;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-url {
      display: block;
      margin-top: 3px;
      color: var(--subtle);
      font-size: 0.76rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .feed-time {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .empty-mini,
    .state {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.64);
      color: var(--muted);
      text-align: center;
    }

    .empty-mini {
      padding: 24px 16px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 32px;
      background: rgba(244, 247, 251, 0.84);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      z-index: 2;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.45rem, 2.4vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .page-subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .stat-pill strong { color: var(--text); }

    .articles-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 26px 32px 42px;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr));
      gap: 18px;
      align-items: start;
      max-width: 1180px;
      margin: 0 auto;
    }

    .article-card {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      animation: riseIn 280ms ease both;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .article-card:hover {
      transform: translateY(-3px);
      border-color: rgba(15, 118, 110, 0.32);
      box-shadow: var(--shadow);
    }

    .article-card.featured {
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.7fr);
      grid-template-rows: auto;
      min-height: 320px;
      background: linear-gradient(135deg, #fff 0%, #f7fbfb 100%);
    }

    .article-media {
      position: relative;
      min-height: 178px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.18), rgba(232, 93, 63, 0.12)),
        var(--soft);
      overflow: hidden;
    }

    .featured .article-media {
      min-height: 320px;
      order: 2;
    }

    .article-media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 300ms ease;
      z-index: 1;
    }

    .article-card:hover .article-media img { transform: scale(1.035); }
    .article-media.image-failed img { display: none; }

    .media-fallback {
      display: grid;
      place-items: center;
      min-height: inherit;
      padding: 20px;
      color: var(--brand-dark);
      font-size: 2rem;
      font-weight: 900;
    }

    .article-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      min-width: 0;
    }

    .featured .article-body {
      justify-content: center;
      padding: clamp(22px, 4vw, 42px);
    }

    .article-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 750;
    }

    .source-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--feed-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--feed-color) 15%, transparent);
      flex: 0 0 auto;
    }

    .latest-label {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-dark);
      font-size: 0.73rem;
      font-weight: 900;
    }

    .article-title {
      color: var(--text);
      text-decoration: none;
      font-size: 1.15rem;
      line-height: 1.28;
      font-weight: 850;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      transition: color 160ms ease;
    }

    .featured .article-title {
      font-size: clamp(1.55rem, 3vw, 2.45rem);
      line-height: 1.12;
    }

    .article-title:hover { color: var(--brand-dark); }

    .article-desc {
      margin: 0;
      color: #46536a;
      line-height: 1.65;
      font-size: 0.94rem;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }

    .featured .article-desc {
      -webkit-line-clamp: 4;
      font-size: 1rem;
    }

    .read-link {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--brand-dark);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 850;
      margin-top: auto;
    }

    .read-link:hover { text-decoration: underline; }

    .state {
      max-width: 680px;
      margin: 54px auto;
      padding: 42px 24px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow-soft);
    }

    .state-icon {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      margin: 0 auto 16px;
      border-radius: var(--radius);
      background: var(--brand-soft);
      color: var(--brand-dark);
      font-size: 1.45rem;
      font-weight: 900;
    }

    .state-title {
      margin: 0 0 7px;
      font-size: 1.18rem;
      color: var(--text);
    }

    .state-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .loading-stack {
      display: grid;
      gap: 18px;
      max-width: 1180px;
      margin: 0 auto;
    }

    .skeleton {
      position: relative;
      overflow: hidden;
      min-height: 176px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
      animation: shimmer 1100ms infinite;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 999px;
      animation: spin 700ms linear infinite;
      flex: 0 0 auto;
    }

    .action-button .spinner {
      width: 14px;
      height: 14px;
      border-color: rgba(15, 118, 110, 0.18);
      border-top-color: var(--brand);
    }

    .toast {
      position: fixed;
      inset-inline-end: 22px;
      inset-block-end: 22px;
      max-width: min(360px, calc(100vw - 32px));
      padding: 13px 15px;
      background: #172033;
      color: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: transform 200ms ease, opacity 200ms ease;
      z-index: 10;
      font-size: 0.9rem;
      line-height: 1.45;
      border-inline-start: 4px solid var(--brand);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error { border-inline-start-color: var(--danger); }
    .toast.success { border-inline-start-color: var(--success); }

    .article-card.article-rtl { text-align: right; }
    .article-card.article-rtl .article-meta { direction: rtl; }

    [dir="rtl"] .app,
    [dir="rtl"] .brand-mark,
    [dir="rtl"] .topbar,
    [dir="rtl"] .topbar-copy,
    [dir="rtl"] .section-heading,
    [dir="rtl"] .sidebar-content,
    [dir="rtl"] .feed-top,
    [dir="rtl"] .feed-actions {
      direction: rtl;
    }

    [dir="rtl"] .sidebar {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { transform: translateX(100%); } }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 980px) {
      body { overflow: auto; }

      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        max-height: none;
      }

      .brand { padding: 15px 18px; }
      .icon-button { display: inline-flex; }

      .sidebar-content {
        display: none;
        max-height: 72vh;
      }

      .sidebar.open .sidebar-content { display: block; }

      .topbar {
        align-items: flex-start;
        padding: 22px 20px;
      }

      .articles-scroll {
        overflow: visible;
        padding: 20px;
      }

      .article-card.featured {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .featured .article-media {
        order: 0;
        min-height: 220px;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        flex-direction: column;
        gap: 14px;
      }

      .topbar-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .stat-pill { flex: 1 1 auto; }
      .articles-scroll { padding: 16px; }
      .articles-grid { gap: 14px; }
      .article-body { padding: 16px; }
      .featured .article-title { font-size: 1.42rem; }
      .article-media, .featured .article-media { min-height: 184px; }
      .brand-title { max-width: 170px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <header class="brand">
        <div class="brand-mark">
          <div class="logo" aria-hidden="true">R</div>
          <div>
            <span class="brand-title" data-i18n="appName">Personal RSS Reader</span>
            <span class="brand-subtitle" data-i18n="appSubtitle">Your river of news</span>
          </div>
        </div>
        <button class="icon-button" id="menuBtn" type="button" aria-label="Toggle feeds">☰</button>
      </header>

      <div class="sidebar-content">
        <section class="panel add-panel" aria-labelledby="addFeedTitle">
          <div class="section-heading">
            <span class="section-title" id="addFeedTitle" data-i18n="addFeed">Add feed</span>
          </div>
          <div class="input-row">
            <input class="feed-input" id="feedUrlInput" type="url" placeholder="https://feeds.bbci.co.uk/news/rss.xml" autocomplete="off" spellcheck="false" />
            <button class="primary-button" id="subscribeBtn" type="button"><span data-i18n="subscribe">Subscribe</span></button>
            <div class="add-status" id="addStatus" role="status"></div>
          </div>
        </section>

        <section aria-labelledby="feedsTitle">
          <div class="section-heading">
            <span class="section-title" id="feedsTitle" data-i18n="yourFeeds">Your feeds</span>
            <span class="stat-pill" id="feedCount">0</span>
          </div>
          <div class="feed-list" id="feedList"></div>
        </section>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-copy">
          <h1 class="page-title" data-i18n="allArticles">All articles</h1>
          <p class="page-subtitle" data-i18n="pageSubtitle">Newest stories from every feed, in one calm reading view.</p>
        </div>
        <div class="topbar-actions">
          <span class="stat-pill"><strong id="articleCount">0</strong> <span data-i18n="articles">articles</span></span>
          <span class="stat-pill"><strong id="topFeedCount">0</strong> <span data-i18n="feeds">feeds</span></span>
          <button class="lang-button" id="languageBtn" type="button" aria-label="Change language">العربية</button>
        </div>
      </header>

      <div class="articles-scroll" id="articlesContainer" aria-live="polite"></div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const API_BASE = '';
    const DOT_COLORS = ['#0f766e', '#e85d3f', '#2563eb', '#9333ea', '#ca8a04', '#0891b2', '#be123c', '#4d7c0f'];
    const rtlPattern = /[\u0591-\u07FF\uFB1D-\uFDFD\uFE70-\uFEFC]/;

    const translations = {
      en: {
        appName: 'Personal RSS Reader',
        appSubtitle: 'Your river of news',
        addFeed: 'Add feed',
        subscribe: 'Subscribe',
        subscribing: 'Validating...',
        yourFeeds: 'Your feeds',
        allArticles: 'All articles',
        pageSubtitle: 'Newest stories from every feed, in one calm reading view.',
        articles: 'articles',
        feeds: 'feeds',
        emptyFeedsTitle: 'No feeds yet',
        emptyFeedsMessage: 'Add an RSS or Atom URL above to start reading.',
        emptyArticlesTitle: 'Nothing to read yet',
        emptyArticlesMessage: 'Subscribe to a feed and your newest articles will appear here.',
        loadingFeeds: 'Loading feeds...',
        loadingArticles: 'Loading articles...',
        feedLoadError: 'Could not load feeds.',
        articleLoadErrorTitle: 'Could not load articles',
        articleLoadErrorMessage: 'Make sure the server is running and try again.',
        pasteUrl: 'Please paste a feed URL first.',
        checkingFeed: 'Checking feed...',
        networkError: 'Network error. Is the server running?',
        subscribedTo: 'Subscribed to "{title}"',
        refresh: 'Refresh',
        remove: 'Remove',
        refreshed: 'Refreshed {time}',
        neverRefreshed: 'Never refreshed',
        removeConfirm: 'Remove "{title}" and all its articles?',
        refreshFailed: 'Refresh failed.',
        removeFailed: 'Failed to remove feed.',
        latest: 'Latest',
        readArticle: 'Read article',
        justNow: 'Just now',
        minuteAgo: '{count}m ago',
        hourAgo: '{count}h ago',
        dayAgo: '{count}d ago',
        imageAlt: 'Article image for {title}',
        noDescription: 'No description available.',
        menuLabel: 'Toggle feeds',
        langButton: 'العربية'
      },
      ar: {
        appName: 'قارئ RSS الشخصي',
        appSubtitle: 'كل أخبارك في مسار واحد',
        addFeed: 'إضافة مصدر',
        subscribe: 'اشتراك',
        subscribing: 'جار التحقق...',
        yourFeeds: 'مصادرك',
        allArticles: 'كل المقالات',
        pageSubtitle: 'أحدث القصص من كل المصادر في واجهة قراءة هادئة.',
        articles: 'مقالة',
        feeds: 'مصدر',
        emptyFeedsTitle: 'لا توجد مصادر بعد',
        emptyFeedsMessage: 'أضف رابط RSS أو Atom أعلاه لبدء القراءة.',
        emptyArticlesTitle: 'لا توجد مقالات بعد',
        emptyArticlesMessage: 'اشترك في مصدر وستظهر أحدث المقالات هنا.',
        loadingFeeds: 'جار تحميل المصادر...',
        loadingArticles: 'جار تحميل المقالات...',
        feedLoadError: 'تعذر تحميل المصادر.',
        articleLoadErrorTitle: 'تعذر تحميل المقالات',
        articleLoadErrorMessage: 'تأكد من تشغيل الخادم ثم حاول مرة أخرى.',
        pasteUrl: 'يرجى لصق رابط المصدر أولا.',
        checkingFeed: 'جار فحص المصدر...',
        networkError: 'خطأ في الشبكة. هل الخادم يعمل؟',
        subscribedTo: 'تم الاشتراك في "{title}"',
        refresh: 'تحديث',
        remove: 'حذف',
        refreshed: 'تم التحديث {time}',
        neverRefreshed: 'لم يحدث بعد',
        removeConfirm: 'هل تريد حذف "{title}" وكل مقالاته؟',
        refreshFailed: 'فشل التحديث.',
        removeFailed: 'فشل حذف المصدر.',
        latest: 'الأحدث',
        readArticle: 'اقرأ المقال',
        justNow: 'الآن',
        minuteAgo: 'منذ {count} د',
        hourAgo: 'منذ {count} س',
        dayAgo: 'منذ {count} يوم',
        imageAlt: 'صورة المقال: {title}',
        noDescription: 'لا يوجد وصف متاح.',
        menuLabel: 'إظهار المصادر',
        langButton: 'English'
      }
    };

    let feedsCache = [];
    let articleCount = 0;
    let locale = localStorage.getItem('rss-reader-locale') || 'en';
    let toastTimer;

    const feedList = document.getElementById('feedList');
    const articlesContainer = document.getElementById('articlesContainer');
    const feedUrlInput = document.getElementById('feedUrlInput');
    const subscribeBtn = document.getElementById('subscribeBtn');
    const addStatus = document.getElementById('addStatus');
    const languageBtn = document.getElementById('languageBtn');
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');

    document.addEventListener('DOMContentLoaded', async () => {
      applyLocale();
      renderLoading();
      await Promise.all([loadFeeds(), loadArticles()]);

      subscribeBtn.addEventListener('click', addFeed);
      languageBtn.addEventListener('click', toggleLanguage);
      menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
      feedUrlInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') addFeed();
      });
    });

    async function addFeed() {
      const url = feedUrlInput.value.trim();
      if (!url) {
        setStatus(t('pasteUrl'), 'error');
        return;
      }

      setButtonLoading(subscribeBtn, t('subscribing'));
      setStatus(t('checkingFeed'), 'loading');

      try {
        const res = await fetch(`${API_BASE}/api/feeds`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (res.ok) {
          feedUrlInput.value = '';
          setStatus('', '');
          showToast(t('subscribedTo', { title: data.title }), 'success');
          await loadFeeds();
          await loadArticles();
        } else {
          setStatus(data.error || t('feedLoadError'), 'error');
        }
      } catch {
        setStatus(t('networkError'), 'error');
      } finally {
        subscribeBtn.disabled = false;
        subscribeBtn.innerHTML = `<span>${t('subscribe')}</span>`;
      }
    }

    async function loadFeeds() {
      feedList.innerHTML = `<div class="empty-mini">${t('loadingFeeds')}</div>`;

      try {
        const res = await fetch(`${API_BASE}/api/feeds`);
        const feeds = await res.json();
        feedsCache = feeds;
        updateStats();

        if (!feeds.length) {
          feedList.innerHTML = emptyMini(t('emptyFeedsTitle'), t('emptyFeedsMessage'));
          return;
        }

        feedList.innerHTML = feeds.map((feed, index) => renderFeed(feed, index)).join('');
      } catch {
        feedList.innerHTML = `<div class="empty-mini">${t('feedLoadError')}</div>`;
      }
    }

    async function loadArticles() {
      articlesContainer.innerHTML = articleSkeletons();

      try {
        const res = await fetch(`${API_BASE}/api/articles`);
        const articles = await res.json();
        articleCount = articles.length;
        updateStats();

        if (!articles.length) {
          articlesContainer.innerHTML = renderState('◇', t('emptyArticlesTitle'), t('emptyArticlesMessage'));
          return;
        }

        articlesContainer.innerHTML = `<div class="articles-grid">${articles.map(renderArticle).join('')}</div>`;
      } catch {
        articlesContainer.innerHTML = renderState('!', t('articleLoadErrorTitle'), t('articleLoadErrorMessage'));
      }
    }

    async function refreshFeed(id, button) {
      const original = button.innerHTML;
      setButtonLoading(button, '');

      try {
        const res = await fetch(`${API_BASE}/api/feeds/${id}/refresh`, { method: 'POST' });
        const data = await res.json();

        if (res.ok) {
          showToast(data.message, 'success');
          await loadFeeds();
          await loadArticles();
        } else {
          showToast(data.error || t('refreshFailed'), 'error');
        }
      } catch {
        showToast(t('networkError'), 'error');
      } finally {
        button.disabled = false;
        button.innerHTML = original;
      }
    }

    async function removeFeed(id, title) {
      if (!confirm(t('removeConfirm', { title }))) return;

      try {
        const res = await fetch(`${API_BASE}/api/feeds/${id}`, { method: 'DELETE' });
        const data = await res.json();

        if (res.ok) {
          showToast(data.message, 'success');
          await loadFeeds();
          await loadArticles();
        } else {
          showToast(data.error || t('removeFailed'), 'error');
        }
      } catch {
        showToast(t('networkError'), 'error');
      }
    }

    function renderFeed(feed, index) {
      const color = DOT_COLORS[index % DOT_COLORS.length];
      const lastRefresh = feed.lastRefreshed ? t('refreshed', { time: timeAgo(feed.lastRefreshed) }) : t('neverRefreshed');
      const title = escHtml(feed.title);
      const url = escHtml(feed.url);

      return `
        <article class="panel feed-item" style="--feed-color:${color}" dir="${textDirection(feed.title)}">
          <div class="feed-top">
            <span class="feed-dot"></span>
            <div class="feed-copy">
              <span class="feed-name" title="${title}">${title}</span>
              <span class="feed-url" title="${url}">${url}</span>
            </div>
          </div>
          <div class="feed-actions">
            <button class="action-button" type="button" onclick="refreshFeed('${escAttr(feed.id)}', this)">↻ ${t('refresh')}</button>
            <button class="action-button danger" type="button" onclick="removeFeed('${escAttr(feed.id)}', '${escAttr(feed.title)}')">× ${t('remove')}</button>
          </div>
          <span class="feed-time">${lastRefresh}</span>
        </article>
      `;
    }

    function renderArticle(article, index) {
      const color = getFeedColor(article.feedId);
      const featured = index === 0;
      const rtl = isRtl(`${article.title} ${article.description}`);
      const title = escHtml(article.title || '');
      const description = escHtml(article.description || t('noDescription'));
      const url = escAttr(article.url || '#');
      const feedTitle = escHtml(article.feedTitle || '');
      const imageUrl = article.imageUrl ? escAttr(article.imageUrl) : '';
      const cardClass = `article-card ${featured ? 'featured' : ''} ${rtl ? 'article-rtl' : ''}`;
      const arrow = locale === 'ar' || rtl ? '←' : '→';

      return `
        <article class="${cardClass}" style="--feed-color:${color}" dir="${rtl ? 'rtl' : 'auto'}">
          ${renderMedia(imageUrl, article.title, article.feedTitle)}
          <div class="article-body">
            <div class="article-meta">
              ${featured ? `<span class="latest-label">${t('latest')}</span>` : ''}
              <span class="source-dot"></span>
              <span>${feedTitle}</span>
              <span aria-hidden="true">•</span>
              <time datetime="${escAttr(article.publishedAt || '')}">${formatDate(article.publishedAt)}</time>
            </div>
            <a class="article-title" href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>
            <p class="article-desc">${description}</p>
            <a class="read-link" href="${url}" target="_blank" rel="noopener noreferrer">${t('readArticle')} <span aria-hidden="true">${arrow}</span></a>
          </div>
        </article>
      `;
    }

    function renderMedia(imageUrl, title, feedTitle) {
      const fallback = fallbackMedia(feedTitle || title || 'RSS');
      if (!imageUrl) return `<div class="article-media">${fallback}</div>`;

      return `
        <div class="article-media">
          ${fallback}
          <img src="${imageUrl}" alt="${escAttr(t('imageAlt', { title: title || feedTitle || '' }))}" loading="lazy" onerror="this.parentElement.classList.add('image-failed')" />
        </div>
      `;
    }

    function fallbackMedia(label) {
      const letter = escHtml((label || 'R').trim().charAt(0).toUpperCase() || 'R');
      return `<div class="media-fallback" aria-hidden="true">${letter}</div>`;
    }

    function renderLoading() {
      feedList.innerHTML = `<div class="empty-mini">${t('loadingFeeds')}</div>`;
      articlesContainer.innerHTML = articleSkeletons();
    }

    function articleSkeletons() {
      return `
        <div class="loading-stack" aria-label="${t('loadingArticles')}">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      `;
    }

    function renderState(icon, title, message) {
      return `
        <div class="state">
          <div class="state-icon" aria-hidden="true">${icon}</div>
          <h2 class="state-title">${title}</h2>
          <p class="state-message">${message}</p>
        </div>
      `;
    }

    function emptyMini(title, message) {
      return `<div class="empty-mini"><strong>${title}</strong><br>${message}</div>`;
    }

    function toggleLanguage() {
      locale = locale === 'en' ? 'ar' : 'en';
      localStorage.setItem('rss-reader-locale', locale);
      applyLocale();
      updateStats();
      loadFeeds();
      loadArticles();
    }

    function applyLocale() {
      const isArabic = locale === 'ar';
      document.documentElement.lang = locale;
      document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(element => {
        element.textContent = t(element.dataset.i18n);
      });
      languageBtn.textContent = t('langButton');
      menuBtn.setAttribute('aria-label', t('menuLabel'));
      subscribeBtn.innerHTML = `<span>${t('subscribe')}</span>`;
    }

    function updateStats() {
      document.getElementById('feedCount').textContent = feedsCache.length;
      document.getElementById('topFeedCount').textContent = feedsCache.length;
      document.getElementById('articleCount').textContent = articleCount;
    }

    function getFeedColor(feedId) {
      const idx = feedsCache.findIndex(feed => feed.id === feedId);
      return idx === -1 ? '#667085' : DOT_COLORS[idx % DOT_COLORS.length];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffMin < 1) return t('justNow');
      if (diffMin < 60) return t('minuteAgo', { count: diffMin });
      if (diffHr < 24) return t('hourAgo', { count: diffHr });
      if (diffDay < 7) return t('dayAgo', { count: diffDay });

      return date.toLocaleDateString(locale === 'ar' ? 'ar-EG' : 'en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function timeAgo(dateStr) {
      return formatDate(dateStr);
    }

    function setButtonLoading(button, label) {
      button.disabled = true;
      button.innerHTML = `<span class="spinner" aria-hidden="true"></span>${label ? `<span>${label}</span>` : ''}`;
    }

    function setStatus(message, type) {
      addStatus.textContent = message;
      addStatus.className = `add-status ${type}`;
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = `toast ${type}`;
      }, 3500);
    }

    function t(key, values = {}) {
      let value = translations[locale][key] || translations.en[key] || key;
      Object.entries(values).forEach(([name, replacement]) => {
        value = value.replace(`{${name}}`, replacement);
      });
      return value;
    }

    function textDirection(value) {
      return isRtl(value) ? 'rtl' : 'auto';
    }

    function isRtl(value) {
      return rtlPattern.test(value || '');
    }

    function escHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escAttr(value) {
      return escHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
