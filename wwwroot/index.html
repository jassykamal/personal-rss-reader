      const url = feedUrlInput.value.trim();
      if (!url) {
        setStatus(t('pasteUrl'), 'error');
        return;
      }

      setButtonLoading(subscribeBtn, t('subscribing'));
      setStatus(t('checkingFeed'), 'loading');

      try {
        const res = await fetch(`${API_BASE}/api/feeds`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (res.ok) {
          feedUrlInput.value = '';
          setStatus('', '');
          showToast(t('subscribedTo', { title: data.title }), 'success');
          await loadFeeds();
          await loadArticles();
          renderCurrentView();
        } else {
          setStatus(data.error || t('feedLoadError'), 'error');
        }
      } catch {
        setStatus(t('networkError'), 'error');
      } finally {
        subscribeBtn.disabled = false;
        subscribeBtn.innerHTML = `<span>${t('subscribe')}</span>`;
      }
    }

    async function loadFeeds() {
      feedList.innerHTML = `<div class="empty-mini">${t('loadingFeeds')}</div>`;

      try {
        const res = await fetch(`${API_BASE}/api/feeds`);
        feedsCache = await res.json();
        updateStats();

        if (!feedsCache.length) {
          feedList.innerHTML = emptyMini(t('emptyFeedsTitle'), t('emptyFeedsMessage'));
          return;
        }

        renderFeedList();
      } catch {
        feedList.innerHTML = `<div class="empty-mini">${t('feedLoadError')}</div>`;
      }
    }

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      document.body.classList.toggle('sidebar-open', sidebar.classList.contains('open'));
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      document.body.classList.remove('sidebar-open');
    }

    async function loadArticles() {
      try {
        const res = await fetch(`${API_BASE}/api/articles`);
        articlesCache = await res.json();
        updateStats();
      } catch {
        articlesContainer.innerHTML = renderState('◇', t('articleLoadErrorTitle'), t('articleLoadErrorMessage'));
      }
    }

    function renderDashboard() {
      articlesContainer.innerHTML = articleSkeletons();

      fetch(`${API_BASE}/api/dashboard/stats`)
        .then(res => res.json())
        .then(data => {
          const newsCount = data.newsFeedCount || 0;
          const podcastCount = data.podcastFeedCount || 0;
          const totalArticles = data.articleCount || 0;
          const latestNews = data.latestNews || [];
          const latestPodcasts = data.latestPodcasts || [];
          const email = window._authEmail || '';

          let html = '<div class="dashboard">';

          html += '<div class="dash-welcome">';
          html += `<h2>${isAuthenticated && email ? escHtml(email.split('@')[0]) + ', ' : ''}${t('welcomeTitle')}</h2>`;
          html += `<p>${t('welcomeSubtitle')}</p>`;
          html += '</div>';

          html += '<div class="dash-stats">';
          html += `<div class="dash-stat-card"><span class="dash-stat-value">${newsCount}</span><span class="dash-stat-label">${t('newsFeeds')}</span></div>`;
          html += `<div class="dash-stat-card"><span class="dash-stat-value">${podcastCount}</span><span class="dash-stat-label">${t('podcastFeeds')}</span></div>`;
          html += `<div class="dash-stat-card"><span class="dash-stat-value">${totalArticles}</span><span class="dash-stat-label">${t('totalArticles')}</span></div>`;
          html += '</div>';

          html += '<div class="dash-section">';
          html += '<div class="dash-section-header">';
          html += `<h3 class="dash-section-title">${t('latestNews')}</h3>`;
          html += `<button class="dash-view-all" onclick="switchView('news')">${t('viewAll')} →</button>`;
          html += '</div>';
          if (latestNews.length) {
            html += `<div class="dash-cards">${latestNews.map(a => renderDashCard(a)).join('')}</div>`;
          } else {
            html += `<div class="dash-empty">${t('noFavoritesMessage')}</div>`;
          }
          html += '</div>';

          html += '<div class="dash-section">';
          html += '<div class="dash-section-header">';
          html += `<h3 class="dash-section-title">${t('latestPodcasts')}</h3>`;
          html += `<button class="dash-view-all" onclick="switchView('podcasts')">${t('viewAll')} →</button>`;
          html += '</div>';
          if (latestPodcasts.length) {
            html += `<div class="dash-cards">${latestPodcasts.map(a => renderDashCard(a)).join('')}</div>`;
          } else {
            html += `<div class="dash-empty">${t('noPodcastEpisodesMsg')}</div>`;
          }
          html += '</div>';

          html += '</div>';
          articlesContainer.innerHTML = html;
          updateFilteredCount(0);
        })
        .catch(() => {
          articlesContainer.innerHTML = renderState('◇', t('articleLoadErrorTitle'), t('articleLoadErrorMessage'));
        });
    }

    function renderDashCard(article) {
      const imageUrl = article.imageUrl ? escAttr(article.imageUrl) : '';
      const title = escHtml(article.title || '');
      const feedTitle = escHtml(article.feedTitle || '');
      const url = escAttr(article.url || '#');
      const letter = (article.feedTitle || 'N').charAt(0).toUpperCase();

      return `
        <div class="dash-card" data-url="${url}" role="link" tabindex="0">
          <div class="dash-card-img">
            ${imageUrl ? `<img src="${imageUrl}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='${letter}'" />` : letter}
          </div>
          <div class="dash-card-body">
            <span class="dash-card-title">${title}</span>
            <span class="dash-card-meta">${feedTitle} · ${formatDate(article.publishedAt)}</span>
          </div>
        </div>
      `;
    }

    function renderFilteredArticles(contentType) {
      let articles = [...articlesCache];

      if (selectedFeedId) {
        articles = articles.filter(a => a.feedId === selectedFeedId);
      }

      if (contentType) {
        const typeVal = contentType === 'News' ? 1 : contentType === 'Podcast' ? 2 : 0;
        const typeFeeds = feedsCache
          .filter(f => f.feedType === typeVal || (contentType === 'News' && f.feedType === 0))
          .map(f => f.id);
        articles = articles.filter(a => typeFeeds.includes(a.feedId));
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        articles = articles.filter(a =>
          a.title.toLowerCase().includes(q) ||
          a.description.toLowerCase().includes(q) ||
          a.feedTitle.toLowerCase().includes(q)
        );
      }

      if (dateFilter !== 'all') {
        const now = Date.now();
        let cutoff = now;
        if (dateFilter === 'today') cutoff = now - 86400000;
        else if (dateFilter === 'week') cutoff = now - 7 * 86400000;
        else if (dateFilter === 'month') cutoff = now - 30 * 86400000;
        articles = articles.filter(a => new Date(a.publishedAt).getTime() > cutoff);
      }

      articles.sort((a, b) => {
        const diff = new Date(b.publishedAt) - new Date(a.publishedAt);
        return sortOrder === 'newest' ? diff : -diff;
      });

      updateFilteredCount(articles.length);

      if (!articles.length) {
        articlesContainer.innerHTML = searchQuery
          ? renderState('◇', t('searchNoResults'), t('searchNoResultsMessage'))
          : selectedFeedId
            ? renderState('◇', t('noFeedArticlesTitle'), t('noFeedArticlesMessage'))
            : contentType === 'Podcast'
              ? renderState('◇', t('noPodcastEpisodes'), t('noPodcastEpisodesMsg'))
              : renderState('◇', t('emptyArticlesTitle'), t('emptyArticlesMessage'));
        return;
      }

      if (contentType === 'Podcast') {
        articlesContainer.innerHTML = `<div class="podcast-list">${articles.map(renderPodcastCard).join('')}</div>`;
      } else {
        articlesContainer.innerHTML = `<div class="articles-grid">${articles.map(renderArticle).join('')}</div>`;
      }
    }

    function selectFeed(feedId) {
      selectedFeedId = (selectedFeedId === feedId) ? null : feedId;
      if (currentView === 'home' && feedId) {
        const feed = feedsCache.find(f => f.id === feedId);
        if (feed && feed.feedType === 2) {
          switchView('podcasts');
        } else {
          switchView('news');
        }
        selectedFeedId = feedId;
        renderFeedList();
        const ct = feed?.feedType === 2 ? 'Podcast' : 'News';
        renderFilteredArticles(ct);
        closeSidebar();
        return;
      }
      renderFeedList();
      const ct = currentView === 'podcasts' ? 'Podcast' : currentView === 'news' ? 'News' : null;
      if (currentView === 'news' || currentView === 'podcasts') {
        renderFilteredArticles(ct);
      } else if (currentView === 'home') {
        renderFilteredArticles(null);
      }
      closeSidebar();
    }

    async function refreshFeed(id, button) {
      const original = button.innerHTML;
      setButtonLoading(button, '');

      try {
        const res = await fetch(`${API_BASE}/api/feeds/${id}/refresh`, { method: 'POST' });
        const data = await res.json();

        if (res.ok) {
          showToast(data.message, 'success');
          await loadFeeds();
          await loadArticles();
          renderCurrentView();
        } else {
          showToast(data.error || t('refreshFailed'), 'error');
        }
      } catch {
        showToast(t('networkError'), 'error');
      } finally {
        button.disabled = false;
        button.innerHTML = original;
      }
    }

    async function removeFeed(id, title) {
      if (!confirm(t('removeConfirm', { title }))) return;

      try {
        const res = await fetch(`${API_BASE}/api/feeds/${id}`, { method: 'DELETE' });
        const data = await res.json();

        if (res.ok) {
          if (selectedFeedId === id) selectedFeedId = null;
          showToast(data.message, 'success');
          await loadFeeds();
          await loadArticles();
          renderCurrentView();
        } else {
          showToast(data.error || t('removeFailed'), 'error');
        }
      } catch {
        showToast(t('networkError'), 'error');
      }
    }

    function renderFeed(feed, index) {
      const color = DOT_COLORS[index % DOT_COLORS.length];
      const count = articlesCache.filter(a => a.feedId === feed.id).length;
      const title = escHtml(feed.title);
      const selected = feed.id === selectedFeedId ? ' selected' : '';

      return `
        <div class="feed-item${selected}" style="--feed-color:${color}" dir="${textDirection(feed.title)}" data-feed-id="${escAttr(feed.id)}">
          <div class="feed-top">
            <span class="feed-dot"></span>
            <div class="feed-copy">
              <span class="feed-name" dir="auto">${title}</span>
              <span class="feed-count">${count} ${t('articles')}</span>
            </div>
          </div>
          <div class="feed-actions">
            <button class="feed-action-btn" type="button" title="${t('refresh')}" onclick="refreshFeed('${escAttr(feed.id)}', this)">↻</button>
            <button class="feed-action-btn feed-action-danger" type="button" title="${t('remove')}" onclick="removeFeed('${escAttr(feed.id)}', '${escAttr(feed.title)}')">✕</button>
          </div>
        </div>
      `;
    }

    function renderFeedList() {
      let feeds = [...feedsCache];

      if (currentView === 'news') {
        feeds = feeds.filter(f => f.feedType === 0 || f.feedType === 1);
        if (!feeds.length) {
          feedList.innerHTML = `<div class="empty-mini"><strong>${t('noNewsFeeds')}</strong><br>${t('noNewsFeedsMsg')}</div>`;
          return;
        }
      } else if (currentView === 'podcasts') {
        feeds = feeds.filter(f => f.feedType === 2);
        if (!feeds.length) {
          feedList.innerHTML = `<div class="empty-mini"><strong>${t('noPodcastFeeds')}</strong><br>${t('noPodcastFeedsMsg')}</div>`;
          return;
        }
      }

      feedList.innerHTML = feeds.map((feed, index) => renderFeed(feed, index)).join('');
    }

    function renderArticle(article, index) {
      const color = getFeedColor(article.feedId);
      const featured = index === 0;
      const rtl = isRtl(`${article.title} ${article.description}`);
      const titleHtml = highlightText(article.title || '', searchQuery);
      const descHtml = highlightText(article.description || t('noDescription'), searchQuery);
      const url = escAttr(article.url || '#');
      const feedTitle = escHtml(article.feedTitle || '');
      const imageUrl = article.imageUrl ? escAttr(article.imageUrl) : '';
      const cardClass = `article-card ${featured ? 'featured' : ''} ${rtl ? 'article-rtl' : ''}`;
      const arrow = locale === 'ar' || rtl ? '←' : '→';
      const shareTitle = escAttr(article.title || '');
      const readTime = getReadingTime(article.description);

      return `
        <article class="${cardClass}" style="--feed-color:${color}" dir="${rtl ? 'rtl' : 'auto'}" tabindex="0" role="article" aria-label="${escAttr(article.title || '')}">
          ${renderMedia(imageUrl, article.title, article.feedTitle)}
          <div class="article-body">
            <div class="article-meta">
              ${featured ? `<span class="latest-label">${t('latest')}</span>` : ''}
              <span class="source-dot"></span>
              <span>${feedTitle}</span>
              <span aria-hidden="true">•</span>
              <time datetime="${escAttr(article.publishedAt || '')}">${formatDate(article.publishedAt)}</time>
              ${readTime ? `<span aria-hidden="true">•</span><span class="reading-time">${readTime}</span>` : ''}
            </div>
            <a class="article-title" href="${url}" target="_blank" rel="noopener noreferrer">${titleHtml}</a>
            <p class="article-desc" dir="auto">${descHtml}</p>
            <div class="article-actions">
              <a class="read-link" href="${url}" target="_blank" rel="noopener noreferrer">${t('readArticle')} <span aria-hidden="true">${arrow}</span></a>
              <div class="article-actions-right">
                <button class="favorite-btn${favoritedUrls.has(article.url || '') ? ' favorited' : ''}" type="button" data-url="${url}" title="${t('favorite')}" aria-label="${t('favorite')}">${favoritedUrls.has(article.url || '') ? '♥' : '♡'}</button>
                <button class="article-action-btn" type="button" title="${t('shareArticle')}" onclick="shareArticle(event, '${url}', '${shareTitle}')" aria-label="${t('shareArticle')}">↗</button>
                <button class="article-action-btn" type="button" title="${t('copyLink')}" onclick="copyArticleLink(event, '${url}')" aria-label="${t('copyLink')}">⧉</button>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderPodcastCard(episode, index) {
      const color = getFeedColor(episode.feedId);
      const imageUrl = episode.imageUrl ? escAttr(episode.imageUrl) : '';
      const audioUrl = escAttr(episode.audioUrl || '');
      const title = escHtml(episode.title || '');
      const feedTitle = escHtml(episode.feedTitle || '');
      const url = escAttr(episode.url || '#');
      const description = escHtml(episode.description || '');
      const duration = episode.duration ? escHtml(episode.duration) : '';
      const episodeAuthor = episode.episodeAuthor ? escHtml(episode.episodeAuthor) : '';
      const shareTitle = escAttr(episode.title || '');
      const letter = (episode.feedTitle || 'P').charAt(0).toUpperCase();
      const isPlaying = window._currentAudioUrl === episode.audioUrl;
      const favClass = favoritedUrls.has(episode.url || '') ? ' favorited' : '';

      return `
        <article class="podcast-card" style="--feed-color:${color}" dir="auto">
          <div class="podcast-artwork">
            ${imageUrl
              ? `<img src="${imageUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'" /><div class="podcast-artwork-fallback" style="display:none">${letter}</div>`
              : `<div class="podcast-artwork-fallback">${letter}</div>`}
            <div class="podcast-play-overlay">
              <div class="play-icon">▶</div>
            </div>
          </div>
          <div class="podcast-info">
            <span class="podcast-badge" aria-hidden="true">🎙 ${t('podcastBadge')}</span>
            <div class="podcast-title"><a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a></div>
            <div class="podcast-meta">
              <span>${feedTitle}</span>
              ${episodeAuthor ? `<span class="sep" aria-hidden="true">·</span><span>${episodeAuthor}</span>` : ''}
              <span class="sep" aria-hidden="true">·</span>
              <time datetime="${escAttr(episode.publishedAt || '')}">${formatDate(episode.publishedAt)}</time>
              ${duration ? `<span class="sep" aria-hidden="true">·</span><span>${duration}</span>` : ''}
            </div>
            ${description ? `<p class="podcast-desc" dir="auto">${description}</p>` : ''}
            <div class="podcast-actions">
              ${audioUrl ? `
              <button class="podcast-play-btn${isPlaying ? ' playing' : ''}" type="button"
                data-audio-url="${audioUrl}" data-title="${escAttr(episode.title || '')}" data-feed-title="${escAttr(episode.feedTitle || '')}"
                data-image-url="${imageUrl}" data-episode-url="${url}">
                <span class="btn-icon">${isPlaying ? '⏸' : '▶'}</span> ${isPlaying ? t('pauseEpisode') : t('playEpisode')}
              </button>
              ` : ''}
              <button class="favorite-btn${favClass}" type="button" data-url="${url}" title="${t('favorite')}" aria-label="${t('favorite')}">${favClass ? '♥' : '♡'}</button>
              <button class="article-action-btn" type="button" title="${t('shareArticle')}" onclick="shareArticle(event, '${url}', '${shareTitle}')" aria-label="${t('shareArticle')}">↗</button>
              <button class="article-action-btn" type="button" title="${t('copyLink')}" onclick="copyArticleLink(event, '${url}')" aria-label="${t('copyLink')}">⧉</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderMedia(imageUrl, title, feedTitle) {
      const fallback = fallbackMedia(feedTitle || title || 'RSS');
      if (!imageUrl) return `<div class="article-media">${fallback}</div>`;

      return `
        <div class="article-media">
          ${fallback}
          <img src="${imageUrl}" alt="${escAttr(t('imageAlt', { title: title || feedTitle || '' }))}" loading="lazy" onerror="this.parentElement.classList.add('image-failed')" />
        </div>
      `;
    }

    function fallbackMedia(label) {
      const letter = escHtml((label || 'R').trim().charAt(0).toUpperCase() || 'R');
      return `<div class="media-fallback" aria-hidden="true">${letter}</div>`;
    }

    function renderLoading() {
      feedList.innerHTML = `<div class="empty-mini">${t('loadingFeeds')}</div>`;
      articlesContainer.innerHTML = articleSkeletons();
    }

    function articleSkeletons() {
      return `
        <div class="loading-stack" aria-label="${t('loadingArticles')}">
          <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-meta"><div class="skeleton-line medium"></div><div class="skeleton-line long"></div><div class="skeleton-line short"></div></div></div>
          <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-meta"><div class="skeleton-line medium"></div><div class="skeleton-line long"></div><div class="skeleton-line short"></div></div></div>
          <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-meta"><div class="skeleton-line medium"></div><div class="skeleton-line long"></div><div class="skeleton-line short"></div></div></div>
        </div>
      `;
    }

    function renderState(icon, title, message) {
      return `
        <div class="state">
          <div class="state-icon" aria-hidden="true">${icon}</div>
          <h2 class="state-title">${title}</h2>
          <p class="state-message">${message}</p>
        </div>
      `;
    }

    function emptyMini(title, message) {
      return `<div class="empty-mini"><strong>${title}</strong><br>${message}</div>`;
    }

    function toggleLanguage() {
      locale = locale === 'en' ? 'ar' : 'en';
      localStorage.setItem('rss-reader-locale', locale);
      applyLocale();
      updateStats();
      renderAuthArea();
      loadFeeds();
      loadArticles();
    }

    function toggleUserMenu(e) {
      e.stopPropagation();
      if (userMenuDropdown.classList.contains('open')) {
        userMenuDropdown.classList.remove('open');
      } else {
        renderAuthArea();
        userMenuDropdown.classList.add('open');
      }
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      localStorage.setItem(THEME_KEY, currentTheme);
      document.documentElement.setAttribute('data-theme', currentTheme);
    }

    function applyLocale() {
      const isArabic = locale === 'ar';
      document.documentElement.lang = locale;
      document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(element => {
        element.textContent = t(element.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
        element.placeholder = t(element.dataset.i18nPlaceholder);
      });
      menuBtn.setAttribute('aria-label', t('menuLabel'));
      subscribeBtn.innerHTML = `<span>${t('subscribe')}</span>`;
      if (sortBtn) sortBtn.title = sortOrder === 'newest' ? t('sortNewest') : t('sortOldest');
    }

    function updateStats() {
      document.getElementById('feedCount').textContent = feedsCache.length;
    }

    function getFeedColor(feedId) {
      const idx = feedsCache.findIndex(feed => feed.id === feedId);
      return idx === -1 ? '#667085' : DOT_COLORS[idx % DOT_COLORS.length];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffMin < 1) return t('justNow');
      if (diffMin < 60) return t('minuteAgo', { count: diffMin });
      if (diffHr < 24) return t('hourAgo', { count: diffHr });
      if (diffDay < 7) return t('dayAgo', { count: diffDay });

      return date.toLocaleDateString(locale === 'ar' ? 'ar-EG' : 'en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function timeAgo(dateStr) {
      return formatDate(dateStr);
    }

    function setButtonLoading(button, label) {
      button.disabled = true;
      button.innerHTML = `<span class="spinner" aria-hidden="true"></span>${label ? `<span>${label}</span>` : ''}`;
    }

    function setStatus(message, type) {
      addStatus.textContent = message;
      addStatus.className = `add-status ${type}`;
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = `toast ${type}`;
      }, 3500);
    }

    function shareArticle(event, url, title) {
      event.stopPropagation();
      if (navigator.share) {
        navigator.share({ title, url }).catch(() => {});
      } else {
        copyToClipboard(url);
      }
    }

    function copyArticleLink(event, url) {
      event.stopPropagation();
      copyToClipboard(url);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text)
        .then(() => showToast(t('linkCopied'), 'success'))
        .catch(() => showToast(t('copyFailed'), 'error'));
    }

    function doSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = searchInput.value.trim();
        searchBar.classList.toggle('has-value', !!searchQuery);
        renderCurrentView();
      }, 250);
    }

    function clearSearch() {
      searchInput.value = '';
      searchQuery = '';
      searchBar.classList.remove('has-value');
      renderCurrentView();
      searchInput.focus();
    }

    function setDateFilter(filter) {
      dateFilter = filter;
      const pills = filterGroup.querySelectorAll('.filter-pill');
      pills.forEach(p => p.classList.toggle('active', p.dataset.filter === filter));
      renderCurrentView();
    }

    function toggleSort() {
      sortOrder = sortOrder === 'newest' ? 'oldest' : 'newest';
      sortBtn.classList.toggle('desc', sortOrder === 'oldest');
      sortBtn.textContent = sortOrder === 'newest' ? '↓' : '↑';
      sortBtn.title = sortOrder === 'newest' ? t('sortNewest') : t('sortOldest');
      renderCurrentView();
    }

    function renderCurrentView() {
      if (currentView === 'news') renderFilteredArticles('News');
      else if (currentView === 'podcasts') renderFilteredArticles('Podcast');
      else if (currentView === 'home') renderDashboard();
      else if (currentView === 'favorites' || currentView === 'recent') {
        switchView(currentView);
      }
    }

    function updateFilteredCount(count) {
      document.getElementById('articleCount').textContent = count;
    }

    function getReadingTime(description) {
      if (!description) return null;
      const wordCount = description.trim().split(/\s+/).length;
      const minutes = Math.max(1, Math.ceil(wordCount / 200));
      return t('minRead', { count: minutes });
    }

    function highlightText(text, query) {
      if (!query || !text) return escHtml(text);
      const escaped = escHtml(text);
      const pattern = escapeRegex(query);
      const regex = new RegExp(`(${pattern})`, 'gi');
      return escaped.replace(regex, '<mark class="search-highlight">$1</mark>');
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    async function checkAuth() {
      try {
        const [authRes, csrfRes] = await Promise.all([
          fetch('/api/auth/me'),
          fetch('/api/antiforgery/token')
        ]);
        const authData = await authRes.json();
        const csrfData = await csrfRes.json();
        isAuthenticated = authData.authenticated;
        csrfToken = csrfData.token || '';
        if (isAuthenticated) {
          window._authEmail = authData.email || '';
          await loadFavorites();
        }
        renderAuthArea();
      } catch {
        isAuthenticated = false;
        renderAuthArea();
      }
    }

    async function loadFavorites() {
      try {
        const res = await fetch('/api/favorites');
        if (!res.ok) return;
        const favs = await res.json();
        favoritedUrls = new Set(favs.map(f => f.articleUrl));
      } catch { /* ignore */ }
    }

    function renderAuthArea() {
      const email = window._authEmail || '';
      if (isAuthenticated && email) {
        userAvatar.innerHTML = email.charAt(0).toUpperCase();
      } else {
        userAvatar.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      }

      let html = '<div class="menu-section">';
      if (isAuthenticated) {
        html += `<div class="menu-label">${escHtml(email)}</div>`;
        html += `<button class="menu-item" data-action="favorites"><span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>${t('favorites')}</button>`;
      } else {
        html += `<a class="menu-item" href="login.html">${t('signIn')}</a>`;
        html += `<a class="menu-item" href="register.html">Create account</a>`;
      }
      html += '</div><div class="menu-section">';
      html += `<button class="menu-item" data-action="theme"><span class="menu-icon">${currentTheme === 'light' ? '☽' : '☀'}</span>${currentTheme === 'light' ? 'Dark mode' : 'Light mode'}</button>`;
      html += `<button class="menu-item" data-action="language"><span class="menu-icon">⇄</span>${t('langButton')}</button>`;
      html += '</div>';
      if (isAuthenticated) {
        html += '<div class="menu-section">';
        html += `<button class="menu-item danger" data-action="logout"><span class="menu-icon">⏻</span>${t('logout')}</button>`;
        html += '</div>';
      }
      userMenuDropdown.innerHTML = html;
    }

    async function toggleFavorite(btn) {
      if (!isAuthenticated) {
        showToast(t('signInToFavorite'), '');
        return;
      }

      const url = btn.dataset.url;
      const card = btn.closest('.article-card') || btn.closest('.podcast-card');
      const isPodcast = !!btn.closest('.podcast-card');
      const title = card?.querySelector('.article-title, .podcast-title a')?.textContent || '';
      const feedTitle = card?.querySelector('.article-meta span, .podcast-meta span')?.textContent || '';
      const img = card?.querySelector('.article-media img, .podcast-artwork img');
      const imageUrl = img?.src || '';
      const contentType = isPodcast ? 'Podcast' : 'News';

      const wasFav = favoritedUrls.has(url);

      try {
        const res = await fetch('/api/favorites', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': csrfToken
          },
          body: JSON.stringify({ articleUrl: url, articleTitle: title, feedTitle, imageUrl, contentType })
        });
        const data = await res.json();
        if (data.favorited) {
          favoritedUrls.add(url);
          btn.classList.add('favorited');
          btn.innerHTML = '♥';
          showToast(t('favoriteAdded'), 'success');
        } else {
          favoritedUrls.delete(url);
          btn.classList.remove('favorited');
          btn.innerHTML = '♡';
          showToast(t('favoriteRemoved'), 'success');
        }
      } catch {
        showToast(t('networkError'), 'error');
      }
    }

    async function recordArticleView(url, card) {
      if (!isAuthenticated || !url) return;
      const isPodcast = !!card?.closest('.podcast-card') || card?.classList?.contains('podcast-card');
      const titleEl = card?.querySelector('.article-title, .podcast-title a, .dash-card-title');
      const feedEl = card?.querySelector('.article-meta span, .podcast-meta span, .dash-card-meta');
      const img = card?.querySelector('.article-media img, .podcast-artwork img, .dash-card-img img');
      const title = titleEl?.textContent || '';
      const feedTitle = feedEl?.textContent || '';
      const imageUrl = img?.src || '';
      const contentType = isPodcast ? 'Podcast' : 'News';
      const body = JSON.stringify({ articleUrl: url, articleTitle: title, feedTitle, imageUrl, contentType });
      try {
        await fetch('/api/recently-viewed', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
        await fetch('/api/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
      } catch { /* ignore */ }
    }

    async function switchView(view) {
      currentView = view;
      selectedFeedId = null;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));

      const searchToolbar = document.getElementById('searchToolbar');
      const pageTitle = document.querySelector('.page-title');
      const pageSubtitle = document.querySelector('.page-subtitle');

      if (view === 'home') {
        searchToolbar.style.display = 'none';
        pageTitle.textContent = t('appName');
        pageSubtitle.textContent = t('appSubtitle');
        renderFeedList();
        renderDashboard();
        return;
      }

      searchToolbar.style.display = 'flex';

      if (view === 'news') {
        pageTitle.textContent = t('navNews');
        pageSubtitle.textContent = t('pageSubtitle');
      } else if (view === 'podcasts') {
        pageTitle.textContent = t('navPodcasts');
        pageSubtitle.textContent = t('noPodcastEpisodesMsg');
      } else if (view === 'favorites') {
        pageTitle.textContent = t('favorites');
        pageSubtitle.textContent = '';
      } else if (view === 'recent') {
        pageTitle.textContent = t('navRecent');
        pageSubtitle.textContent = '';
      }

      renderFeedList();

      if (view === 'news') {
        renderFilteredArticles('News');
      } else if (view === 'podcasts') {
        renderFilteredArticles('Podcast');
      } else if (view === 'favorites' || view === 'recent') {
        if (!isAuthenticated) {
          showToast(t('signInRequired'), '');
          switchView('home');
          return;
        }

        articlesContainer.innerHTML = articleSkeletons();

        try {
          const endpoint = view === 'favorites' ? '/api/favorites' : '/api/recently-viewed';
          const res = await fetch(endpoint);
          if (!res.ok) throw new Error('Failed');
          const items = await res.json();

          if (!items.length) {
            articlesContainer.innerHTML = renderState('◇',
              view === 'favorites' ? t('noFavorites') : t('noRecent'),
              view === 'favorites' ? t('noFavoritesMessage') : t('noRecentMessage'));
            return;
          }

          const articles = items.map(item => ({
            id: item.articleUrl,
            feedId: '',
            feedTitle: item.feedTitle,
            title: item.articleTitle,
            url: item.articleUrl,
            description: '',
            imageUrl: item.imageUrl || null,
            audioUrl: item.contentType === 'Podcast' ? item.articleUrl : null,
            publishedAt: item.savedAt || item.viewedAt || new Date().toISOString()
          }));

          const newsItems = articles.filter(a => !a.audioUrl);
          const podcastItems = articles.filter(a => a.audioUrl);
          let parts = [];
          if (podcastItems.length) {
            parts.push(`<div class="podcast-list">${podcastItems.map(renderPodcastCard).join('')}</div>`);
          }
          if (newsItems.length) {
            parts.push(`<div class="articles-grid">${newsItems.map(renderArticle).join('')}</div>`);
          }
          articlesContainer.innerHTML = parts.join('');
        } catch {
          articlesContainer.innerHTML = renderState('⚠', t('articleLoadErrorTitle'), t('articleLoadErrorMessage'));
        }
      }
    }

    async function doLogout() {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'X-CSRF-TOKEN': csrfToken }
        });
        isAuthenticated = false;
        favoritedUrls.clear();
        currentView = 'home';
        window._authEmail = '';
        renderAuthArea();
        userAvatar.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === 'home'));
      renderCurrentView();
        showToast(t('loggedOut'), 'success');
      } catch {
        showToast(t('networkError'), 'error');
      }
    }

    // ── Audio Player ───────────────────────────────────────────

    window._currentAudioUrl = null;
    window._episodeList = [];

    function initAudioPlayer() {
      const audio = document.getElementById('audioElement');
      const playBtn = document.getElementById('playerPlayBtn');
      const seekBar = document.getElementById('playerSeek');
      const volumeSlider = document.getElementById('playerVolume');
      const volumeBtn = document.getElementById('playerVolumeBtn');
      const speedBtn = document.getElementById('playerSpeedBtn');
      const closeBtn = document.getElementById('playerCloseBtn');
      const currentTime = document.getElementById('playerCurrent');
      const totalTime = document.getElementById('playerTotal');

      playBtn.addEventListener('click', () => {
        if (audio.paused) audio.play(); else audio.pause();
      });

      audio.addEventListener('play', () => { playBtn.textContent = '⏸'; updatePlayButtons(window._currentAudioUrl); });
      audio.addEventListener('pause', () => { playBtn.textContent = '▶'; updatePlayButtons(null); });
      audio.addEventListener('ended', () => { playBtn.textContent = '▶'; playNextEpisode(); });

      audio.addEventListener('timeupdate', () => {
        currentTime.textContent = formatTime(audio.currentTime);
        if (audio.duration && isFinite(audio.duration)) {
          seekBar.value = (audio.currentTime / audio.duration) * 100;
          totalTime.textContent = formatTime(audio.duration);
        }
      });

      audio.addEventListener('loadedmetadata', () => {
        if (audio.duration && isFinite(audio.duration)) {
          totalTime.textContent = formatTime(audio.duration);
        }
      });

      seekBar.addEventListener('input', () => {
        if (audio.duration && isFinite(audio.duration)) {
          audio.currentTime = (seekBar.value / 100) * audio.duration;
        }
      });

      volumeSlider.addEventListener('input', () => {
        audio.volume = volumeSlider.value / 100;
      });

      volumeBtn.addEventListener('click', () => {
        audio.muted = !audio.muted;
        volumeBtn.textContent = audio.muted ? '🔇' : '🔊';
      });

      speedBtn.addEventListener('click', () => {
        const speeds = [1, 1.25, 1.5, 2, 0.75];
        const current = parseFloat(speedBtn.textContent);
        const idx = speeds.indexOf(current);
        const next = speeds[(idx + 1) % speeds.length];
        audio.playbackRate = next;
        speedBtn.textContent = next + 'x';
      });

      document.getElementById('playerSkipBackBtn').addEventListener('click', () => {
        audio.currentTime = Math.max(0, audio.currentTime - 15);
      });

      document.getElementById('playerSkipFwdBtn').addEventListener('click', () => {
        audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 30);
      });

      document.getElementById('playerPrevBtn').addEventListener('click', playPreviousEpisode);
      document.getElementById('playerNextBtn').addEventListener('click', playNextEpisode);

      closeBtn.addEventListener('click', closePlayer);
    }

    function collectEpisodeList() {
      const buttons = document.querySelectorAll('.podcast-play-btn[data-audio-url]');
      window._episodeList = Array.from(buttons).map(btn => ({
        audioUrl: btn.dataset.audioUrl,
        title: btn.dataset.title || '',
        feedTitle: btn.dataset.feedTitle || '',
        imageUrl: btn.dataset.imageUrl || '',
        episodeUrl: btn.dataset.episodeUrl || ''
      }));
    }

    function playPreviousEpisode() {
      if (!window._episodeList.length) collectEpisodeList();
      const idx = window._episodeList.findIndex(e => e.audioUrl === window._currentAudioUrl);
      if (idx > 0) {
        const ep = window._episodeList[idx - 1];
        startEpisode(ep.audioUrl, ep.title, ep.feedTitle, ep.imageUrl, ep.episodeUrl);
      }
    }

    function playNextEpisode() {
      if (!window._episodeList.length) collectEpisodeList();
      const idx = window._episodeList.findIndex(e => e.audioUrl === window._currentAudioUrl);
      if (idx >= 0 && idx < window._episodeList.length - 1) {
        const ep = window._episodeList[idx + 1];
        startEpisode(ep.audioUrl, ep.title, ep.feedTitle, ep.imageUrl, ep.episodeUrl);
      } else {
        closePlayer();
      }
    }

    function startEpisode(audioUrl, title, feedTitle, imageUrl, episodeUrl) {
      const audio = document.getElementById('audioElement');
      window._currentAudioUrl = audioUrl;
      audio.src = audioUrl;
      audio.load();
      updatePlayerInfo(title, feedTitle, imageUrl);
      audio.play().catch(() => {
        showToast('Could not play this episode.', 'error');
      });
      document.getElementById('audioPlayer').classList.add('visible');
      updatePlayButtons(audioUrl);
    }

    function toggleAudioPlayback(audioUrl, title, feedTitle, imageUrl, episodeUrl, button) {
      const audio = document.getElementById('audioElement');
      const player = document.getElementById('audioPlayer');

      if (window._currentAudioUrl === audioUrl && !audio.paused) {
        audio.pause();
        return;
      }

      if (window._currentAudioUrl !== audioUrl) {
        collectEpisodeList();
        startEpisode(audioUrl, title, feedTitle, imageUrl, episodeUrl);
      } else {
        audio.play().catch(() => {
          showToast('Could not play this episode.', 'error');
        });
        player.classList.add('visible');
        updatePlayButtons(audioUrl);
      }
    }

    function updatePlayerInfo(title, feedTitle, imageUrl) {
      document.getElementById('playerEpisode').textContent = title || '-';
      document.getElementById('playerFeed').textContent = feedTitle || '-';
      const artwork = document.getElementById('playerArtwork');
      const letter = (feedTitle || 'P').charAt(0).toUpperCase();
      if (imageUrl) {
        artwork.innerHTML = `<img src="${escAttr(imageUrl)}" alt="" onerror="this.parentElement.textContent='${letter}'" />`;
      } else {
        artwork.textContent = letter;
      }
    }

    function updatePlayButtons(activeUrl) {
      document.querySelectorAll('.podcast-play-btn').forEach(btn => {
        const isActive = btn.dataset.audioUrl === activeUrl && activeUrl != null;
        btn.classList.toggle('playing', isActive);
        const icon = btn.querySelector('.btn-icon');
        if (icon) icon.textContent = isActive ? '⏸' : '▶';
      });
    }

    function closePlayer() {
      const audio = document.getElementById('audioElement');
      audio.pause();
      audio.src = '';
      window._currentAudioUrl = null;
      window._episodeList = [];
      document.getElementById('audioPlayer').classList.remove('visible');
      document.getElementById('playerEpisode').textContent = '-';
      document.getElementById('playerFeed').textContent = '-';
      document.getElementById('playerCurrent').textContent = '0:00';
      document.getElementById('playerTotal').textContent = '0:00';
      document.getElementById('playerSeek').value = 0;
      updatePlayButtons(null);
    }

    function formatTime(seconds) {
      if (!isFinite(seconds) || seconds < 0) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + s.toString().padStart(2, '0');
    }

    function t(key, values = {}) {
      let value = translations[locale][key] || translations.en[key] || key;
      Object.entries(values).forEach(([name, replacement]) => {
        value = value.replace(`{${name}}`, replacement);
      });
      return value;
    }

    function textDirection(value) {
      return isRtl(value) ? 'rtl' : 'auto';
    }

    function isRtl(value) {
      return rtlPattern.test(value || '');
    }

    function escHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escAttr(value) {
      return escHtml(value).replace(/`/g, '&#096;');
    }
  </script>
