<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Personal RSS Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --subtle: #94a3b8;
      --line: #e2e8f0;
      --brand: #0d9488;
      --brand-hover: #0f766e;
      --brand-soft: #ccfbf1;
      --danger: #e11d48;
      --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.05);
      --radius: 8px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #1e293b;
      --soft: #172033;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --subtle: #64748b;
      --line: #334155;
      --brand: #2dd4bf;
      --brand-hover: #5eead4;
      --brand-soft: #134e4a;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      padding: 36px 32px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      font-weight: 850;
      font-size: 1.2rem;
    }

    h1 {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 850;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      color: var(--text);
      font-size: 0.92rem;
      outline: 0;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
    }

    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: var(--radius);
      background: var(--brand);
      color: #fff;
      font-weight: 850;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover { background: var(--brand-hover); transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: wait; transform: none; }

    .error {
      min-height: 20px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 0.84rem;
      text-align: center;
    }

    .hint {
      margin-top: 4px;
      color: var(--subtle);
      font-size: 0.76rem;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .footer a { color: var(--brand); text-decoration: none; font-weight: 700; }
    .footer a:hover { text-decoration: underline; }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
    }

    [data-theme="light"] .theme-toggle .moon { display: inline; }
    [data-theme="light"] .theme-toggle .sun { display: none; }
    [data-theme="dark"] .theme-toggle .moon { display: none; }
    [data-theme="dark"] .theme-toggle .sun { display: inline; }
  </style>
</head>
<body data-theme="light">
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
    <span class="sun" aria-hidden="true">☀</span>
    <span class="moon" aria-hidden="true">☽</span>
  </button>

  <div class="card">
    <div class="logo" aria-hidden="true">R</div>
    <h1>Create account</h1>
    <p class="subtitle">Start saving your favorite articles</p>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="new-password" required />
        <div class="hint">Minimum 6 characters</div>
      </div>
      <button type="submit" id="submitBtn">Create account</button>
      <div class="error" id="errorMsg" role="alert"></div>
    </form>
    <div class="footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const THEME_KEY = 'rss-reader-theme';
    let theme = localStorage.getItem(THEME_KEY) || 'light';
    document.documentElement.setAttribute('data-theme', theme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      localStorage.setItem(THEME_KEY, theme);
      document.documentElement.setAttribute('data-theme', theme);
    });

    document.getElementById('registerForm').addEventListener('submit', async event => {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      if (!email || !password) {
        errorEl.textContent = 'Email and password are required.';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        return;
      }

      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Registration failed.';
        }
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
