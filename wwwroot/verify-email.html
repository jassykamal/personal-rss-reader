<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — Personal RSS Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --line: #e2e8f0;
      --brand: #0d9488;
      --brand-hover: #0f766e;
      --brand-soft: #ccfbf1;
      --success: #059669;
      --danger: #e11d48;
      --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.05);
      --radius: 8px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #1e293b;
      --soft: #172033;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --line: #334155;
      --brand: #2dd4bf;
      --brand-hover: #5eead4;
      --brand-soft: #134e4a;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      padding: 40px 32px;
      text-align: center;
    }

    .icon {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: 14px;
      font-size: 1.6rem;
    }

    .icon.success { background: #d1fae5; color: #059669; }
    .icon.error { background: #fee2e2; color: #dc2626; }
    .icon.loading { background: var(--soft); color: var(--muted); }

    h1 { font-size: 1.3rem; font-weight: 850; margin-bottom: 8px; }
    p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 20px; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--line);
      border-top-color: var(--brand);
      border-radius: 999px;
      animation: spin 700ms linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: inline-block;
      padding: 11px 24px;
      border-radius: var(--radius);
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 850;
      font-size: 0.92rem;
      transition: background 160ms ease, transform 160ms ease;
    }
    .btn:hover { background: var(--brand-hover); transform: translateY(-1px); }
    .btn.secondary {
      background: transparent;
      color: var(--brand);
      border: 1px solid var(--line);
    }
    .btn.secondary:hover { background: var(--soft); }

    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .resend-form { margin-top: 24px; border-top: 1px solid var(--line); padding-top: 20px; text-align: left; }
    .resend-form label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
    .resend-form input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--soft); color: var(--text); font-size: 0.9rem; outline: 0; margin-bottom: 10px;
    }
    .resend-form input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(13,148,136,0.12); }
    .resend-form button { width: 100%; }

    .msg { font-size: 0.84rem; margin-top: 10px; min-height: 20px; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }

    .theme-toggle {
      position: fixed; top: 16px; right: 16px;
      width: 36px; height: 36px; border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--soft); color: var(--muted); cursor: pointer; font-size: 1.1rem;
    }
    [data-theme="light"] .theme-toggle .moon { display: inline; }
    [data-theme="light"] .theme-toggle .sun { display: none; }
    [data-theme="dark"] .theme-toggle .moon { display: none; }
    [data-theme="dark"] .theme-toggle .sun { display: inline; }
  </style>
</head>
<body data-theme="light">
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
    <span class="sun" aria-hidden="true">☀</span>
    <span class="moon" aria-hidden="true">☽</span>
  </button>

  <div class="card">
    <div id="iconContainer"><div class="spinner" aria-label="Verifying"></div></div>
    <h1 id="statusTitle">Verifying your email</h1>
    <p id="statusMsg">Please wait...</p>
    <div class="actions" id="actions" style="display:none">
      <a href="login.html" class="btn">Sign in</a>
      <a href="/" class="btn secondary">Go to reader</a>
    </div>

    <div class="resend-form" id="resendSection" style="display:none">
      <p style="text-align:center;color:var(--muted);font-size:0.86rem">Did not receive the email?</p>
      <form id="resendForm" novalidate>
        <label for="resendEmail">Email address</label>
        <input id="resendEmail" type="email" autocomplete="email" />
        <button type="submit" class="btn">Resend verification</button>
        <div class="msg" id="resendMsg"></div>
      </form>
    </div>
  </div>

  <script>
    const THEME_KEY = 'rss-reader-theme';
    let theme = localStorage.getItem(THEME_KEY) || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      localStorage.setItem(THEME_KEY, theme);
      document.documentElement.setAttribute('data-theme', theme);
    });

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const token = params.get('token');

    const iconContainer = document.getElementById('iconContainer');
    const statusTitle = document.getElementById('statusTitle');
    const statusMsg = document.getElementById('statusMsg');
    const actions = document.getElementById('actions');
    const resendSection = document.getElementById('resendSection');

    function showState(iconClass, iconChar, title, msg, showActions, showResend) {
      iconContainer.innerHTML = `<div class="icon ${iconClass}">${iconChar}</div>`;
      statusTitle.textContent = title;
      statusMsg.textContent = msg;
      actions.style.display = showActions ? 'flex' : 'none';
      resendSection.style.display = showResend ? 'block' : 'none';
    }

    async function verify() {
      if (!userId || !token) {
        showState('error', '!', 'Invalid link', 'The verification link is missing parameters.', true, true);
        return;
      }

      try {
        const res = await fetch(`/api/auth/confirm-email?userId=${encodeURIComponent(userId)}&token=${encodeURIComponent(token)}`);
        const data = await res.json();

        if (res.ok) {
          showState('success', '✓', 'Email verified', 'Your email has been confirmed. You can now sign in.', true, false);
        } else {
          showState('error', '!', 'Verification failed', data.error || 'The link is invalid or has expired.', true, true);
        }
      } catch {
        showState('error', '!', 'Network error', 'Could not reach the server. Please try again.', true, true);
      }
    }

    document.getElementById('resendForm').addEventListener('submit', async event => {
      event.preventDefault();
      const email = document.getElementById('resendEmail').value.trim();
      const msgEl = document.getElementById('resendMsg');

      if (!email) { msgEl.textContent = 'Please enter your email.'; msgEl.className = 'msg error'; return; }

      msgEl.textContent = 'Sending...';
      msgEl.className = 'msg';

      try {
        const res = await fetch('/api/auth/resend-confirmation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: '', rememberMe: false })
        });
        const data = await res.json();
        msgEl.textContent = data.message || 'Email sent.';
        msgEl.className = 'msg success';
      } catch {
        msgEl.textContent = 'Network error. Try again.';
        msgEl.className = 'msg error';
      }
    });

    verify();
  </script>
</body>
</html>
